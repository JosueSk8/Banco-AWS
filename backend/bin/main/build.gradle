apply plugin: 'java'
apply plugin: 'application'

group = 'com.example'
version = '1.0.0'

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'software.amazon.awssdk:s3:2.25.11'
    implementation 'software.amazon.awssdk:sns:2.25.11'
    implementation 'software.amazon.awssdk:sqs:2.25.11'

    implementation 'com.google.code.gson:gson:2.10.1'
}

// --- El mapeo vital para encontrar el código ---
sourceSets {
    main {
        java {
            srcDirs = ['.']
        }
    }
}

mainClassName = 'Main'

// --- El bloque para atrapar argumentos ---
run {
    if (project.hasProperty('rol')) {
        args project.rol
    }
}
